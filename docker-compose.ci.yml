services:
  phx:
    build:
      context: .
      dockerfile: ./docker/dev.Dockerfile
      args:
        BASE_IMAGE: ${CI_BASE_IMAGE:-ghcr.io/communitymaintained/pinchflat-ci-base:latest}
      # Cache the compiled-deps layer (mix deps.compile for dev+test) across CI
      # runs via the GitHub Actions cache backend. Unchanged mix.lock/mix.exs
      # restores the layer instead of recompiling. Requires buildx + bake
      # (COMPOSE_BAKE=true) in CI for the type=gha backend to be available.
      cache_from:
        - type=gha,scope=ci-dev
      cache_to:
        - type=gha,mode=max,scope=ci-dev
    environment:
      - MIX_ENV=test
    volumes:
      - '.:/app'
      # These lines ensure the deps can be saved as build artifacts for caching
      - '/app/deps'
      - '/app/_build'
    ports:
      - '4008:4008'
    command: tail -F /dev/null
