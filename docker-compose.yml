services:
  phx:
    build:
      context: .
      dockerfile: ./docker/dev.Dockerfile
      args:
        BASE_IMAGE: ghcr.io/communitymaintained/pinchflat-ci-base:latest
    volumes:
      - '.:/app'
    ports:
      - '4008:4008'
    command: bash -c "chmod +x docker/docker-run.dev.sh && docker/docker-run.dev.sh"
    stdin_open: true
    tty: true
