name: CI

on:
  pull_request:
    branches: ['main']
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to build'
        required: false
        default: ''

env:
  # Pinned to a smoke-tested ci-base build. Bump via PR after a new ci-base.yml run.
  # NOTE: keep this in sync with the test job's container.image — the env context
  # isn't available there, so the SHA is duplicated and must be bumped in both.
  CI_BASE_IMAGE: ghcr.io/communitymaintained/tubeless-ci-base:sha-739d82a

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    # Run every step natively inside the sha-pinned ci-base image (Elixir, OTP,
    # Node, yt-dlp, ffmpeg, Deno, Apprise all baked in). GitHub mounts the
    # workspace into the container, so no compose, no detached keepalive, and no
    # `exec -T` TTY workaround are needed.
    container:
      image: ghcr.io/communitymaintained/tubeless-ci-base:sha-739d82a
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      MIX_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Some tests and fixtures hardcode /app (the historical compose bind-mount
      # point) — e.g. paths baked into test/support/files/*.json and the 101/100
      # exit-code mock scripts. Point /app at the checked-out workspace so those
      # absolute paths resolve under the container: runner without touching code.
      - name: Symlink workspace to /app
        run: |
          rm -rf /app
          ln -s "$GITHUB_WORKSPACE" /app

      # Cache compiled deps and node_modules keyed on the lockfiles. Unlike the
      # old Docker-layer cache (which rarely hit), this restores the actual
      # deps/_build/node_modules dirs the steps below read from.
      - name: Cache deps and build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            deps
            _build
            node_modules
            assets/node_modules
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock', 'mix.exs', 'yarn.lock', 'assets/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install Elixir and JS deps
        run: |
          mix deps.get
          yarn install
          (cd assets && yarn install)

      # SQLean SQLite extensions aren't committed to git (fetched at build time).
      # Migrations use gen_random_uuid() and queries use regexp_like(), so they
      # must be present before ecto.create/migrate and the test run.
      - name: Fetch SQLean extensions
        run: ./tooling/fetch-sqlean.sh

      - name: Create and Migrate database
        run: |
          mix ecto.create
          mix ecto.migrate

      - name: Run code checks
        run: mix check --no-fix --no-retry

  docker-pr:
    name: Build PR Image
    runs-on: ubuntu-latest
    needs: test
    # Build for all PRs, including forks. Fork PRs get a read-only GITHUB_TOKEN
    # and can't push to GHCR, so this job never pushes — it saves the built
    # image as an artifact, and the pr-image-publish workflow pushes it from the
    # trusted base-repo context (where the write token is available). This keeps
    # untrusted PR code and write credentials in separate, non-overlapping runs.
    # release-please PRs are handled by docker-rc instead.
    if: |
      github.event_name == 'pull_request' &&
      !startsWith(github.head_ref, 'release-please')
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # For pull_request events GITHUB_SHA is the ephemeral merge commit
      # (refs/pull/N/merge), not the PR's head commit. Tag with the head SHA so
      # the image tag matches the commit the contributor actually pushed.
      - name: Get short SHA
        id: meta
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: echo "sha=${HEAD_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      # Read-only login so the build can pull the private CI base image.
      # Fork tokens are read-only, which is sufficient here (no push happens).
      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./docker/selfhosted.Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: tubeless-pr:${{ github.event.pull_request.number }}
          build-args: CI_BASE_IMAGE=${{ env.CI_BASE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Save image and metadata
        run: |
          docker save tubeless-pr:${{ github.event.pull_request.number }} -o image.tar
          mkdir -p meta
          echo "${{ github.event.pull_request.number }}" > meta/pr
          echo "${{ steps.meta.outputs.sha }}" > meta/sha

      - name: Upload image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pr-image
          path: |
            image.tar
            meta/
          retention-days: 1

  docker-rc:
    name: Build RC Image
    runs-on: ubuntu-latest
    needs: test
    if: |
      (
        github.event_name == 'pull_request' &&
        startsWith(github.head_ref, 'release-please') &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        github.event_name == 'workflow_dispatch' &&
        startsWith(github.ref_name, 'release-please')
      )
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Get version and lowercase repo
        id: meta
        run: |
          echo "version=$(cat version.txt)" >> $GITHUB_OUTPUT
          echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./docker/selfhosted.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ steps.meta.outputs.repo }}-dev:rc-${{ steps.meta.outputs.version }}-${{ github.run_number }}
          build-args: CI_BASE_IMAGE=${{ env.CI_BASE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
