name: CI

on:
  pull_request:
    branches: ['master']
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to build'
        required: false
        default: ''

env:
  # Pinned to a smoke-tested ci-base build. Bump via PR after a new ci-base.yml run.
  CI_BASE_IMAGE: ghcr.io/communitymaintained/pinchflat-ci-base:sha-bb9ea60

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      COMPOSE_FILE: ./docker-compose.ci.yml
      MIX_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull prebuilt images
        run: docker compose pull

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/dev.Dockerfile
          load: true
          build-args: BASE_IMAGE=${{ env.CI_BASE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Docker image
        run: docker compose up --detach

      # NOTE: All exec commands use the -T flag to compensate for
      # a bug in the GitHub Actions runner where its stdin/stderr
      # will erroneously report that it's a TTY.
      # Aside from handling this bug the -T flag is not required
      # See https://github.com/actions/runner/issues/241 and https://github.com/docker/compose/issues/8537
      - name: Install Elixir and JS deps
        run: |
          docker compose exec -T phx mix deps.get && yarn install && cd assets && yarn install && cd ..

      - name: Create and Migrate database
        run: |
          docker compose exec -T phx mix ecto.create
          docker compose exec -T phx mix ecto.migrate

      - name: Run code checks
        run: docker compose exec -T phx mix check --no-fix --no-retry

  docker-pr:
    name: Build PR Image
    runs-on: ubuntu-latest
    needs: test
    # Build for all PRs, including forks. Fork PRs get a read-only GITHUB_TOKEN
    # and can't push to GHCR, so this job never pushes — it saves the built
    # image as an artifact, and the pr-image-publish workflow pushes it from the
    # trusted base-repo context (where the write token is available). This keeps
    # untrusted PR code and write credentials in separate, non-overlapping runs.
    # release-please PRs are handled by docker-rc instead.
    if: |
      github.event_name == 'pull_request' &&
      !startsWith(github.head_ref, 'release-please')
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get short SHA
        id: meta
        run: echo "sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Read-only login so the build can pull the private CI base image.
      # Fork tokens are read-only, which is sufficient here (no push happens).
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/selfhosted.Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: pinchflat-pr:${{ github.event.pull_request.number }}
          build-args: CI_BASE_IMAGE=${{ env.CI_BASE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Save image and metadata
        run: |
          docker save pinchflat-pr:${{ github.event.pull_request.number }} -o image.tar
          mkdir -p meta
          echo "${{ github.event.pull_request.number }}" > meta/pr
          echo "${{ steps.meta.outputs.sha }}" > meta/sha

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: pr-image
          path: |
            image.tar
            meta/
          retention-days: 1

  docker-rc:
    name: Build RC Image
    runs-on: ubuntu-latest
    needs: test
    if: |
      (
        github.event_name == 'pull_request' &&
        startsWith(github.head_ref, 'release-please') &&
        github.event.pull_request.head.repo.full_name == github.repository
      ) || (
        github.event_name == 'workflow_dispatch' &&
        startsWith(github.ref_name, 'release-please')
      )
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get version and lowercase repo
        id: meta
        run: |
          echo "version=$(cat version.txt)" >> $GITHUB_OUTPUT
          echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/selfhosted.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ steps.meta.outputs.repo }}-dev:rc-${{ steps.meta.outputs.version }}-${{ github.run_number }}
          build-args: CI_BASE_IMAGE=${{ env.CI_BASE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
