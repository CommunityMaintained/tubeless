name: CI Base Image

on:
  push:
    branches: ['main']
    paths:
      - 'docker/ci-base.Dockerfile'
      - 'docker/ci-base.requirements.txt'
  workflow_dispatch:

jobs:
  build:
    name: Build, Smoke, and Push CI Base Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_REPO: ghcr.io/communitymaintained/tubeless-ci-base
      CI_BASE_IMAGE: ghcr.io/communitymaintained/tubeless-ci-base:latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Compute tags
        id: tags
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          echo "sha_tag=${IMAGE_REPO}:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "latest_tag=${IMAGE_REPO}:latest" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build amd64 locally first so we can smoke-test before pushing anything.
      # The multi-arch push later reuses the buildx cache, so the second build
      # is cheap.
      - name: Build for smoke test (amd64, local)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./docker/ci-base.Dockerfile
          platforms: linux/amd64
          load: true
          tags: tubeless-ci-base:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test toolchain
        run: |
          docker run --rm tubeless-ci-base:smoke sh -c '
            set -eux
            mix --version
            node --version
            yarn --version
            deno --version
            yt-dlp --version
            apprise --version
            ffmpeg -version | head -1
            ffprobe -version | head -1
          '

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./docker/ci-base.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Pushed:" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.tags.outputs.sha_tag }}\` (immutable; pin consumers here)" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.tags.outputs.latest_tag }}\` (floating; local dev only)" >> $GITHUB_STEP_SUMMARY
