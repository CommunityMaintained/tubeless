name: CI Base Image

on:
  push:
    branches: ['master']
    paths:
      - 'docker/ci-base.Dockerfile'
  workflow_dispatch:

jobs:
  build:
    name: Build and Push CI Base Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      CI_BASE_IMAGE: ghcr.io/communitymaintained/pinchflat-ci-base:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate timestamp tag
        id: ts
        run: echo "tag=ghcr.io/communitymaintained/pinchflat-ci-base:$(date +%s)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/ci-base.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.CI_BASE_IMAGE }}
            ${{ steps.ts.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
