name: Release Please

on:
  push:
    branches: ['main']

env:
  # Pinned to a smoke-tested ci-base build. Bump via PR after a new ci-base.yml run.
  # NOTE: keep this in sync with the test job's container.image — the env context
  # isn't available there, so the SHA is duplicated and must be bumped in both.
  CI_BASE_IMAGE: ghcr.io/communitymaintained/tubeless-ci-base:sha-1629079

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    # Run every step natively inside the sha-pinned ci-base image. GitHub mounts
    # the workspace into the container, so no compose, no detached keepalive, and
    # no `exec -T` TTY workaround are needed.
    container:
      image: ghcr.io/communitymaintained/tubeless-ci-base:sha-1629079
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      MIX_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Some tests and fixtures hardcode /app (the historical compose bind-mount
      # point) — e.g. paths baked into test/support/files/*.json and the 101/100
      # exit-code mock scripts. Point /app at the checked-out workspace so those
      # absolute paths resolve under the container: runner without touching code.
      - name: Symlink workspace to /app
        run: |
          rm -rf /app
          ln -s "$GITHUB_WORKSPACE" /app

      - name: Cache deps and build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            deps
            _build
            node_modules
            assets/node_modules
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock', 'mix.exs', 'yarn.lock', 'assets/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install Elixir and JS deps
        run: |
          mix deps.get
          yarn install
          (cd assets && yarn install)

      # SQLean SQLite extensions aren't committed to git (fetched at build time).
      # Migrations use gen_random_uuid() and queries use regexp_like(), so they
      # must be present before ecto.create/migrate and the test run.
      - name: Fetch SQLean extensions
        run: ./tooling/fetch-sqlean.sh

      - name: Create and Migrate database
        run: |
          mix ecto.create
          mix ecto.migrate

      - name: Run code checks
        run: mix check --no-fix --no-retry

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Strip v prefix from release tag
        id: version
        run: |
          echo "value=$(echo '${{ needs.release-please.outputs.tag_name }}' | sed 's/^v//')" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: |
            docker.io/communitymaintained/tubeless
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./docker/selfhosted.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: CI_BASE_IMAGE=${{ env.CI_BASE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
