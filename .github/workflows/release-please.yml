name: Release Please

on:
  push:
    branches: ['master']

env:
  # TODO: pin to a smoke-tested :sha-<short> tag once ci-base.yml has produced one.
  # :latest floats and is fine for bootstrapping; bump via PR for reproducibility.
  CI_BASE_IMAGE: ghcr.io/communitymaintained/pinchflat-ci-base:latest

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      COMPOSE_FILE: ./docker-compose.ci.yml
      MIX_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull prebuilt images
        run: docker compose pull

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/dev.Dockerfile
          load: true
          build-args: BASE_IMAGE=${{ env.CI_BASE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Docker image
        run: docker compose up --detach

      - name: Install Elixir and JS deps
        run: |
          docker compose exec -T phx mix deps.get && yarn install && cd assets && yarn install && cd ..

      - name: Create and Migrate database
        run: |
          docker compose exec -T phx mix ecto.create
          docker compose exec -T phx mix ecto.migrate

      - name: Run code checks
        run: docker compose exec -T phx mix check --no-fix --no-retry

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Strip v prefix from release tag
        id: version
        run: |
          echo "value=$(echo '${{ needs.release-please.outputs.tag_name }}' | sed 's/^v//')" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            docker.io/communitymaintained/pinchflat
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/selfhosted.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: CI_BASE_IMAGE=${{ env.CI_BASE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
