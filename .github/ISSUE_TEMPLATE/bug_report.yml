name: Bug Report
description: Report a bug
title: '[Triage] <your title here> '
labels: ['triage']
assignees: ['CommunityMaintained']
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: 'A clear and concise description of what the bug is.'
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: To reproduce
      description: 'Steps to reproduce the behavior:'
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
        5. If applicable, share the channel link
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Expected behavior
      description: 'A clear and concise description of what you expected to happen.'
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: 'Add any other context about the problem here.'
    validations:
      required: false
  - type: textarea
    id: diganostics
    attributes:
      label: Diagnostic info
    validations:
      required: false
  - type: upload
    id: screenshots
    attributes:
      label: Screenshots
      description: 'If applicable, add screenshots for additional context.'
    validations:
      required: false
  - type: checkboxes
    id: agreements
    attributes:
      label: 'I have verified the following:'
      description: I have verified that this bug report has not been reported before.
      options:
        - label: This bug report has not been reported before
          required: true
