name: Feature Request
description: Request a feature for this project.
title: '[FR] <your title here>'
labels: ['feature request']
assignees: ['CommunityMaintained']
body:
  - type: textarea
    id: problem
    attributes:
      label: 'Is your feature request related to a problem? Please describe.'
      description: 'A clear and concise description of what the problem is.'
      placeholder: "It's too complicated to..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "Describe the solution you'd like"
      description: 'A clear and concise description of what you want to happen.'
      placeholder: 'What I want to change/happen is...'
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 'Any alternatives?'
      description: "A clear and concise description of any alternative solutions or features you've considered."
      placeholder: "The alternatives I've considered are..."
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: 'Add any other context about the feature request here.'
      placeholder:
    validations:
      required: false
  - type: upload
    id: screenshots
    attributes:
      label: Screenshots
      description: 'If applicable, add screenshots for additional context.'
    validations:
      required: false
  - type: checkboxes
    id: agreements
    attributes:
      label: 'I have verified the following:'
      description: I have verified that this feature request has not been reported before.
      options:
        - label: This feature request has not been requested before
          required: true
